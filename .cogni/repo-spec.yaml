# Node Template — repo-spec
#
# Identity for the hub's node-template deployment; node_id MUST match
# infra/catalog/node-template.yaml. Forks renaming this scaffold MUST
# regenerate both UUIDs:
#   node_id:  openssl rand -hex 16 | sed 's/\(.\{8\}\)\(.\{4\}\)\(.\{4\}\)\(.\{4\}\)\(.\{12\}\)/\1-\2-\3-\4-\5/'
#   scope_id: uuidv5(node_id, "default")
# See docs/spec/identity-model.md, docs/spec/multi-node-tenancy.md.

schema_version: "0.1.4"

node_id: "b927a9dd-6132-4fc9-a51e-e3cee2568e3c"
scope_id: "b44d4394-3147-5787-acab-51546be6a3da"
scope_key: "default"

intent:
  name: node-template
  # Identity projected to /.well-known/agent.json → the operator gallery reads it
  # (never hardcodes). Forkers: replace hook/mission/brand with your node's own.
  #   hook    — punchy ≤6-word gallery card tagline
  #   mission — 1–3 sentence north-star, surfaced at the top of every agent's
  #             session cognition (the node's reason to exist)
  #   brand   — { icon, color }; `icon` is the SINGLE source for the node's mark —
  #             app header, gallery card, og:image all render it (no hand-edited AppHeader
  #             JSX). It is POLYMORPHIC: a Lucide icon NAME (PascalCase, e.g. `GitFork`)
  #             OR a hosted image path (a real logo, e.g. `/MyLogo.png`, from the node's own
  #             `app/public/`). `color` tints the card wash + monogram fallback.
  #             Forks: set these two fields; never re-hardcode an icon in AppHeader.
  hook: "Build from this shared foundation"
  mission: "The first and most general Cogni template — an ever-improving foundation for a DAO-governed AI service app, carrying working CI/CD, governance, payments, and cognition so each fork builds only its mission, not its plumbing. The seed of a family of category-specific templates to come."
  brand:
    icon: "GitFork"
    color: "#22c55e"
    # Transitional: gallery still reads `thumbnail` until the operator renders `icon`
    # directly. /opengraph-image now renders the icon, so the gallery shows it today.
    thumbnail: "/opengraph-image"

cogni_dao:
  chain_id: "8453" # Base mainnet

# Activity ledger ingestion + approver allowlist.
# `approvers` gates the `(admin)/` route group and write routes under
# `/api/v1/attribution/*`. Replace with the fork's DAO-owner wallet(s) when
# spinning up a new node from this template.
activity_ledger:
  epoch_length_days: 7
  approvers:
    - "0x070075F1389Ae1182aBac722B36CA12285d0c949" # derekg1729.eth (template default)
  activity_sources:
    github:
      attribution_pipeline: cogni-v0.0
      source_refs: ["Cogni-DAO/standalone-node"]

payments:
  status: pending_activation

# Outbound payment config — the human-custodied steward wallet that settles vendor
# invoices (OpenRouter) via manual USDC checkout. The operator wallet funds this one
# pinned address via withdrawToSteward; a human then completes each vendor checkout.
# Default = Derek's admin wallet (he admins all current forks). See docs/design/node-steward-wallet.md.
payments_out:
  steward_wallet:
    address: "0x070075F1389Ae1182aBac722B36CA12285d0c949"

# Born-reviewable default gates. When this node is minted as a single-node fork
# (node-at-root, no `nodes:` registry) the operator's review path runs these gates
# against the repo-root `.cogni/rules/` below. The mint (`renderRepoSpec`) re-emits
# this same block onto the minted repo's identity spec — keep the two in lockstep.
# Gate set coordinated with the operator review path (Lane A). Tune per node.
gates:
  - type: review-limits
    id: review_limits
    with:
      max_changed_files: 50
      max_total_diff_kb: 1500
  - type: ai-rule
    with:
      rule_file: pr-syntropy-coherence.yaml
  - type: ai-rule
    with:
      rule_file: patterns-and-docs.yaml
  - type: ai-rule
    with:
      rule_file: repo-goal-alignment.yaml
